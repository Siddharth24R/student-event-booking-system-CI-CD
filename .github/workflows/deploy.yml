name: CI/CD Pipeline - NTU Student Events

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2 - Set up Java 11
      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # Step 3 - Build with Maven
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Step 4 - Run Tests
      - name: Run Tests
        run: mvn test

      # Step 5 - Build Docker image (proof of containerisation)
      - name: Build Docker Image
        run: docker build -t student-event-booking:latest .

      - name: Pipeline Complete
        run: echo "Build, test and Docker image creation successful for commit ${{ github.sha }}"
