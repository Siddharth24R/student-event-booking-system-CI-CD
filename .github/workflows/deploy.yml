name: CI/CD Pipeline - NTU Student Events

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2 - Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3 - Install dependencies
      - name: Install Dependencies
        run: npm install

      # Step 4 - Build React app
      - name: Build
        run: npm run build

      # Step 5 - Login to Docker Hub
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 6 - Build Docker image
      - name: Build Docker Image
        run: docker build -t sidd6/ntu-student-events:latest .

      # Step 7 - Push Docker image
      - name: Push Docker Image
        run: docker push sidd6/ntu-student-events:latest

      # Step 8 - Authenticate to GCP
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Step 9 - Deploy to Firebase
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          channelId: live
          projectId: student-event-booking-system