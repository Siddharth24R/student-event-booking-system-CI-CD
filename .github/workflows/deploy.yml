name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run Tests
        run: mvn test

      - name: Build Docker image
        run: docker build -t student-event-booking:latest .

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker tag student-event-booking:latest ${{ secrets.DOCKER_USERNAME }}/student-event-booking:latest
          docker tag student-event-booking:latest ${{ secrets.DOCKER_USERNAME }}/student-event-booking:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/student-event-booking:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/student-event-booking:${{ github.sha }}

      - name: Notify success
        if: success()
        run: echo "Build and deployment successful for commit ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: echo "Build or deployment failed for commit ${{ github.sha }}"
