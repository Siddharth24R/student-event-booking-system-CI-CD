name: CI/CD Pipeline - NTU Student Events

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west2
  SERVICE_NAME: student-event-booking

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2 - Set up Java 11
      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      # Step 3 - Build with Maven
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Step 4 - Run tests
      - name: Run Tests
        run: mvn test

      # Step 5 - Authenticate to GCP
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Step 6 - Set up Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      # Step 7 - Configure Docker for GCR
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      # Step 8 - Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} .
          docker tag gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} gcr.io/$PROJECT_ID/$SERVICE_NAME:latest

      # Step 9 - Push Docker image to GCR
      - name: Push Docker Image to GCR
        run: |
          docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }}
          docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:latest

      # Step 10 - Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --set-env-vars FIREBASE_CREDENTIALS=/app/serviceAccountKey.json

      - name: Notify success
        if: success()
        run: echo "Deployed successfully to Cloud Run — ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: echo "Deployment failed — ${{ github.sha }}"
